name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl

jobs:
  linux-musl:
    name: Linux musl static release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build static binaries
        run: cargo build --release --locked --target "$TARGET" --bins

      - name: Verify static linking
        run: |
          set -euo pipefail
          for bin in "target/$TARGET/release/secrets-server" "target/$TARGET/release/secrets"; do
            file "$bin"
            if readelf -d "$bin" 2>/dev/null | grep -q '(NEEDED)'; then
              echo "::error file=$bin::binary has dynamic dependencies"
              exit 1
            fi
          done

      - name: Package release archive
        run: |
          set -euo pipefail
          archive="secrets-manager-${GITHUB_REF_NAME}-${TARGET}.tar.gz"
          mkdir -p "dist/secrets-manager-${GITHUB_REF_NAME}/bin"
          cp "target/$TARGET/release/secrets-server" "dist/secrets-manager-${GITHUB_REF_NAME}/bin/"
          cp "target/$TARGET/release/secrets" "dist/secrets-manager-${GITHUB_REF_NAME}/bin/"
          cp README.md "dist/secrets-manager-${GITHUB_REF_NAME}/"
          cp -R deploy "dist/secrets-manager-${GITHUB_REF_NAME}/"
          tar -C dist -czf "$archive" "secrets-manager-${GITHUB_REF_NAME}"
          sha256sum "$archive" > "$archive.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            secrets-manager-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz
            secrets-manager-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz.sha256
