name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal Access Token with repo scope — required to commit signatures
          # Create at: Settings > Developer settings > Personal access tokens
          # Then add as repository secret: Settings > Secrets > PERSONAL_ACCESS_TOKEN
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/${{ github.repository }}/blob/master/CLA.md
          branch: cla-signatures
          allowlist: bot*,dependabot[bot],github-actions[bot]
          create-file-commit-message: "chore: initialize CLA signatures store"
          signed-commit-message: "chore: add CLA signature for @${{ github.event.comment.user.login }}"
          custom-notsigned-prcomment: |
            Thank you for your contribution! 🎉

            Before we can merge this pull request, you must sign our **Contributor License Agreement (CLA)**.

            Please read [CLA.md](https://github.com/${{ github.repository }}/blob/master/CLA.md) carefully, then post the following comment on this PR:

            ```
            I have read the CLA Document and I hereby sign the CLA
            ```

            This is required to protect both contributors and the project under AGPLv3.
          custom-allsigned-prcomment: |
            ✅ CLA signed — thank you! This pull request is cleared for review.
