version: 2
updates:
  # Keep GitHub Actions current (resolves the checkout@v4 / Node 20 deprecation).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"

  # Keep Rust dependencies current.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps"
